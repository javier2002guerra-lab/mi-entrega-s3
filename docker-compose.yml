services:
  broker:
    image: redis:7-alpine
    container_name: broker
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  producer:
    build: ./producer
    container_name: producer
    environment:
      - REDIS_HOST=broker
      - REDIS_PORT=6379
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  consumer:
    build: ./consumer
    container_name: consumer
    environment:
      - REDIS_HOST=broker
      - REDIS_PORT=6379
    depends_on:
      broker:
        condition: service_healthy
